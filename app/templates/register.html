{% extends "base.html" %}
{% block title %}Inscription -- TalkZone{% endblock %}
{% block content %}
<div style="max-width: 460px; margin: 40px auto;">
    <div class="card-static" style="text-align: center;">
        <div style="margin-bottom: 24px;">
            <div style="width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 16px; background: linear-gradient(135deg, var(--accent), #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 1.5em;">+</div>
            <h1 style="font-size: 1.6em; margin-bottom: 6px;">Rejoindre TalkZone</h1>
            <p style="color: var(--text-muted); font-size: 0.9em;">Creez votre compte en quelques secondes</p>
        </div>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" style="text-align: left;">
            <div class="form-group">
                <label for="username">Pseudo *</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choisissez un pseudo" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" rows="3" placeholder="Parlez-nous de vous..." style="min-height: 80px;"></textarea>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Choisissez un mot de passe" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">Creer mon compte</button>
        </form>

        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
            <p style="color: var(--text-muted); font-size: 0.9em;">Deja inscrit ?
                <a href="/login" style="font-weight: 600;">Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
