{% extends "base.html" %}
{% block title %}Editer mon profil -- TalkZone{% endblock %}
{% block content %}
<div style="max-width: 560px; margin: 0 auto;">
    <div class="page-header">
        <h1>Editer mon profil</h1>
    </div>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="card-static">
        <div style="text-align: center; margin-bottom: 24px;">
            <div class="avatar avatar-lg" style="margin: 0 auto 12px;">{{ profile.username[0] }}</div>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">Pseudo</label>
                <input type="text" id="username" name="username" class="form-control" value="{{ profile.username }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ profile.email or '' }}" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" rows="4" placeholder="Parlez-nous de vous...">{{ profile.bio or '' }}</textarea>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Sauvegarder</button>
                <a href="/profile/{{ profile.username }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
