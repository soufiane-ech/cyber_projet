{% extends "base.html" %}
{% block title %}Forum{% endblock %}
{% block content %}
<h1>Forum</h1>
<p>Bienvenue, <strong>{{ user.username }}</strong>.</p>

<div class="token-box">
    Session token : {{ token }}
</div>

<hr>

{% for post in posts %}
<div class="post">
    <h3><a href="/post/{{ post.id }}">{{ post.title }}</a></h3>
    <div class="meta">
        Par <a href="/profile/{{ post.username }}">{{ post.username }}</a> le {{ post.created_at }}
    </div>
    <p>{{ post.content }}</p>
</div>
{% endfor %}
{% endblock %}
